<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SIRPC · Citas registradas</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js?v=20260723-01"></script>
  <script src="app.js?v=20260723-02"></script>>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="toprow">
        <img class="brand-logo" src="assets/logo-ucc.svg" alt="UCC SIRPC">
        <div class="brand-text">
          <h1>SIRPC · Panel de citas</h1>
          <p>Consulta administrativa de citas para revisión de planes de curso</p>
        </div>
        <div></div>
      </div>
      <!-- Página administrativa directa. No se publica en el menú de docentes. -->
    </header>

    <main>
      <section class="kpis" id="kpis"></section>
      <section class="card">
        <div class="title">📋 Citas registradas</div>
        <div id="msg"></div>
        <div class="toolbar">
          <div><label>Fecha</label><input id="fFecha" class="inp" type="date"></div>
          <div><label>Estado cita</label><select id="fEstado"><option value="">Todos</option><option>RESERVADA</option><option>CANCELADA</option><option>ATENDIDA</option></select></div>
          <div><label>Buscar</label><input id="fTexto" class="inp" placeholder="Docente, curso, documento..."></div>
          <div style="align-self:end" class="btnrow"><button id="btnFiltrar" class="btn sm">Actualizar</button><button id="btnCsv" class="btn ghost sm">CSV</button></div>
        </div>
        <div class="tablewrap"><table id="tabla"><thead></thead><tbody></tbody></table></div>
      </section>
    </main>
    <footer class="footer">SIRPC · Vista administrativa</footer>
  </div>
<script>
const {api, notify, escapeHtml, estadoPill, downloadCsv} = window.SIRPC;
let ROWS = [];
document.getElementById("btnFiltrar").onclick = cargar;
document.getElementById("btnCsv").onclick = () => downloadCsv("citas_sirpc.csv", ROWS);
document.getElementById("fTexto").addEventListener("keydown", e => { if(e.key === "Enter") cargar(); });
window.addEventListener("load", cargar);

async function cargar(){
  notify("#msg","info","Cargando citas...");
  try{
    const payload = {
      fecha: document.getElementById("fFecha").value,
estadoCita: document.getElementById("fEstado").value,
      texto: document.getElementById("fTexto").value
    };
    const resp = await api("listarCitas", payload);
    ROWS = resp.citas || [];
    renderKpis(resp.resumen || {});
    renderTabla(ROWS);
    notify("#msg","ok",`Registros cargados: ${ROWS.length}`);
  }catch(err){ notify("#msg","err",err.message); }
}
function renderKpis(r){
  document.getElementById("kpis").innerHTML = `
    <div class="kpi"><b>${r.total || 0}</b><span>Total citas</span></div>
    <div class="kpi"><b>${r.reservadas || 0}</b><span>Reservadas</span></div>
    <div class="kpi"><b>${r.canceladas || 0}</b><span>Canceladas</span></div>
    <div class="kpi"><b>${r.visadas || 0}</b><span>Citas con visado completo</span></div>`;
}
function renderTabla(rows){
  const headers = ["NumeroReserva","FechaCita","HoraCita","Jornada","TipoRevision","RevisorAsignado","EstadoCita","EstadoRevision","Documento Profesor","Nombre_Completo","Correo-E","ID Curso","Descripción","Nº Clase","FechaRegistro"];
  document.querySelector("#tabla thead").innerHTML = `<tr>${headers.map(h=>`<th>${escapeHtml(h)}</th>`).join("")}</tr>`;
  document.querySelector("#tabla tbody").innerHTML = rows.map(r => `<tr>${headers.map(h => {
    let v = r[h] || "";
    if(h === "EstadoCita" || h === "EstadoRevision") return `<td>${estadoPill(v)}</td>`;
    return `<td>${escapeHtml(v)}</td>`;
  }).join("")}</tr>`).join("") || `<tr><td colspan="${headers.length}">No hay registros con los filtros seleccionados.</td></tr>`;
}
</script>
</body>
</html>
