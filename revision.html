<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>SIRPC · Revisión y visado</title>
  <link rel="stylesheet" href="styles.css">
  <script src="config.js"></script>
  <script src="app.js"></script>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="toprow">
        <img class="brand-logo" src="assets/logo-ucc.svg" alt="UCC SIRPC">
        <div class="brand-text">
          <h1>SIRPC · Panel de revisores</h1>
          <p>SIB · APA · Rizoma · Registro de visado y observaciones</p>
        </div>
        <div></div>
      </div>
      <nav class="nav">
        <a href="index.html">Agendar</a>
        <a href="citas.html">Citas</a>
        <a class="active" href="revision.html">Revisores</a>
      </nav>
    </header>

    <main>
      <section class="card">
        <div class="title">✅ Gestión de revisión</div>
        <p class="subtitle">Filtre las citas reservadas y marque el resultado de la revisión del plan de curso.</p>
        <div id="msg"></div>
        <div class="toolbar">
          <div><label>Revisor / tipo</label><select id="fTipo"><option value="">Todos</option><option>SIB</option><option>APA</option><option>Rizoma</option></select></div>
          <div><label>Fecha</label><input id="fFecha" class="inp" type="date"></div>
          <div><label>Estado cita</label><select id="fEstado"><option>RESERVADA</option><option value="">Todos</option><option>ATENDIDA</option><option>CANCELADA</option></select></div>
          <div><label>Buscar</label><input id="fTexto" class="inp" placeholder="Docente, curso, reserva..."></div>
          <div style="align-self:end"><button id="btnFiltrar" class="btn sm full">Actualizar</button></div>
        </div>
        <div class="tablewrap"><table id="tabla"><thead></thead><tbody></tbody></table></div>
      </section>
    </main>
    <footer class="footer">SIRPC · Panel de revisores</footer>
  </div>
  <div id="modalRoot"></div>
<script>
const {api, notify, escapeHtml, estadoPill} = window.SIRPC;
let ROWS = [];
document.getElementById("btnFiltrar").onclick = cargar;
document.getElementById("fTexto").addEventListener("keydown", e => { if(e.key === "Enter") cargar(); });
window.addEventListener("load", cargar);
async function cargar(){
  notify("#msg","info","Cargando citas de revisión...");
  try{
    const resp = await api("listarCitas", {
      fecha: document.getElementById("fFecha").value,
      tipoRevision: document.getElementById("fTipo").value,
      estadoCita: document.getElementById("fEstado").value,
      texto: document.getElementById("fTexto").value
    });
    ROWS = resp.citas || [];
    renderTabla(ROWS);
    notify("#msg","ok",`Registros cargados: ${ROWS.length}`);
  }catch(err){ notify("#msg","err",err.message); }
}
function renderTabla(rows){
  const headers = ["FechaCita","HoraCita","TipoRevision","RevisorAsignado","EstadoCita","EstadoRevision","Nombre_Completo","Descripción","Nº Clase","NumeroReserva"];
  document.querySelector("#tabla thead").innerHTML = `<tr>${headers.map(h=>`<th>${escapeHtml(h)}</th>`).join("")}<th>Acción</th></tr>`;
  document.querySelector("#tabla tbody").innerHTML = rows.map(r => `<tr>${headers.map(h => {
    let v = r[h] || "";
    if(h === "EstadoCita" || h === "EstadoRevision") return `<td>${estadoPill(v)}</td>`;
    return `<td>${escapeHtml(v)}</td>`;
  }).join("")}<td><button class="btn green sm" data-reserva="${escapeHtml(r.NumeroReserva)}">Registrar resultado</button></td></tr>`).join("") || `<tr><td colspan="${headers.length+1}">No hay citas con los filtros seleccionados.</td></tr>`;
  document.querySelectorAll("[data-reserva]").forEach(b => b.onclick = () => abrirResultado(b.dataset.reserva));
}
function abrirResultado(numero){
  const r = ROWS.find(x => x.NumeroReserva === numero);
  if(!r) return;
  document.getElementById("modalRoot").innerHTML = `<div class="modal-back"><div class="modal">
    <div class="title">📝 Registrar resultado</div>
    <p class="subtitle"><b>${escapeHtml(r.Nombre_Completo)}</b><br>${escapeHtml(r.Descripción)} · ${escapeHtml(r.TipoRevision)} · Reserva ${escapeHtml(numero)}</p>
    <div id="resMsg"></div>
    <div class="grid g2">
      <div><label>Resultado</label><select id="estadoRevision"><option>VISADO</option><option>CON OBSERVACIONES</option><option>NO ASISTIÓ</option></select></div>
      <div><label>Usuario que registra</label><input id="usuarioRevision" class="inp" placeholder="Nombre del revisor"></div>
    </div>
    <div class="mt"><label>Observaciones</label><textarea id="obs" placeholder="Registre observaciones si aplica"></textarea></div>
    <div class="btnrow mt"><button id="btnGuardar" class="btn green">Guardar resultado</button><button id="btnCerrar" class="btn ghost">Cerrar</button></div>
  </div></div>`;
  document.getElementById("btnCerrar").onclick = cerrar;
  document.getElementById("btnGuardar").onclick = async () => {
    const btn = document.getElementById("btnGuardar");
    btn.disabled = true; btn.textContent = "Guardando...";
    try{
      await api("marcarRevision", {numeroReserva:numero, estadoRevision:document.getElementById("estadoRevision").value, observaciones:document.getElementById("obs").value, usuario:document.getElementById("usuarioRevision").value});
      notify("#resMsg","ok","Resultado guardado correctamente.");
      setTimeout(()=>{ cerrar(); cargar(); }, 700);
    }catch(err){ notify("#resMsg","err",err.message); btn.disabled = false; btn.textContent = "Guardar resultado"; }
  };
}
function cerrar(){ document.getElementById("modalRoot").innerHTML = ""; }
</script>
</body>
</html>
